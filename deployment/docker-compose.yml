services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=production
      - APP_MODE=api
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_HOST=redis
      - LOG_LEVEL=INFO
      - API_DEBUG=false
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../saved_models:/app/saved_models
      - ../artifacts:/app/artifacts
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fednet-network

  inference:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "5001:5001"
    environment:
      - ENVIRONMENT=production
      - APP_MODE=inference
      - PORT=5001
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    volumes:
      - ../saved_models:/app/saved_models
      - ../artifacts:/app/artifacts
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - fednet-network

  dashboard:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "5002:5002"
    environment:
      - ENVIRONMENT=production
      - APP_MODE=dashboard
      - PORT=5002
      - LOG_LEVEL=INFO
    volumes:
      - ../artifacts:/app/artifacts
      - ../attestations:/app/attestations
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fednet-network

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fednet-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fednet-network

volumes:
  mongodb-data:


networks:
  fednet-network:
    driver: bridge
