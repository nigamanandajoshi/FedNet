services:
  - type: web
    name: fednet-dashboard
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SOLANA_NETWORK
        value: devnet
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
  - type: web
    name: fednet-inference
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: LOAD_INFERENCE_APP=true gunicorn wsgi:inference_app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SOLANA_NETWORK
        value: devnet
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
